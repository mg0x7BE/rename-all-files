name: .NET Build and Release
permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Build for Windows
        run: |
          dotnet publish --runtime win-x64 -c Release -o "output/win-x64"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: win-x64-artifact
          path: output/win-x64/RenameAllFiles.exe

  create-release:
    name: Create GitHub Release and Upload Artifacts
    if: github.event_name == 'push' && github.actor == 'mg0x7BE'
    runs-on: ubuntu-latest
    needs: [build-windows]
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: win-x64-artifact
          path: output/win-x64/

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: "latest-${{ github.sha }}"
          name: "Auto-release"
          files: |
            output/win-x64/RenameAllFiles.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

