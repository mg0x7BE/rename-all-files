name: .NET Build and Release
permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build for Windows
        run: |
          dotnet publish --runtime win-x64 -c Release -o "output/win-x64"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7
        with:
          name: win-x64-artifact
          path: output/win-x64/RenameAllFiles.exe

  create-release:
    name: Create GitHub Release and Upload Artifacts
    if: github.event_name == 'push' && github.actor == 'mg0x7BE'
    runs-on: ubuntu-latest
    needs: [build-windows]
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v8
        with:
          name: win-x64-artifact
          path: output/win-x64/

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "latest-${{ github.sha }}"
          name: "Auto-release"
          files: |
            output/win-x64/RenameAllFiles.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

